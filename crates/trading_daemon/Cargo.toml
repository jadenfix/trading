[package]
name = "trading_daemon"
version = "0.1.0"
edition = "2021"

[dependencies]
trading_protocol = { path = "../trading_protocol" }
tokio = { version = "1.35", features = ["full"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
# Pre-declared for upcoming Kalshi market integration work.
kalshi_client = { path = "../../non-agent-workflows/libs/kalshi_client" }
futures = "0.3"
fs2 = "0.4" # For file locking
bytes = "1.5"
tokio-util = { version = "0.7.10", features = ["codec"] }
